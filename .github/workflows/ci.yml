name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # weekly run so nvim-nightly API drift surfaces without waiting for a push
    - cron: "0 6 * * 1"

jobs:
  stylua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua plugin tests

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        neovim: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}
      - if: matrix.neovim == 'nightly'
        run: make test
      # stable leg runs the same tests under luacov (Neovim is LuaJIT = Lua 5.1)
      - if: matrix.neovim == 'stable'
        name: test with coverage
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq luarocks lua5.1 liblua5.1-0-dev
          luarocks --lua-version 5.1 --tree "$HOME/.luarocks" install luacov
          luarocks --lua-version 5.1 --tree "$HOME/.luarocks" install luacov-reporter-lcov
          export LUA_PATH="$HOME/.luarocks/share/lua/5.1/?.lua;$HOME/.luarocks/share/lua/5.1/?/init.lua;;"
          COVERAGE=1 make test
          lua5.1 "$HOME/.luarocks/bin/luacov" -r lcov
          sed -i "s|^SF:$GITHUB_WORKSPACE/|SF:|" luacov.report.out
      - if: matrix.neovim == 'stable'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: luacov.report.out
          format: lcov

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: simple
